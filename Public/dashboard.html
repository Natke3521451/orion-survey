<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>דשבורד ניהולי – אוריון מערכות</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    html, body { overflow: auto !important; height: auto !important; min-height: 100%; }
    body { background-attachment: fixed; align-items: flex-start; padding: 0; }

    #login-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(13,51,71,0.65);
      background-image: url('images/bg.png');
      background-size: cover;
      display: flex; align-items: center; justify-content: center;
    }

    .dash-wrap {
      max-width: 1200px; margin: 0 auto; padding: 32px 24px;
      display: none;
    }
    .dash-wrap.visible { display: block; }

    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.96);
      border-radius: 0 0 16px 16px; padding: 16px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      flex-wrap: wrap; gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    .dash-header img { height: 40px; }
    .dash-header h1 { font-size: 1.3rem; color: var(--dark); }
    .dash-header .btn { font-size: 0.85rem; padding: 10px 20px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(255,255,255,0.9);
      border-radius: 14px; padding: 20px;
      text-align: center; box-shadow: var(--shadow);
    }
    .stat-card .num { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
    .stat-card .lbl { font-size: 0.82rem; color: #666; margin-top: 4px; }

    .section-title {
      font-size: 1.15rem; font-weight: 700; color: var(--dark);
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }

    .grid-2 {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; margin-bottom: 28px;
    }
    @media(max-width:900px){ .grid-2 { grid-template-columns: 1fr; } }

    .chart-card {
      background: rgba(255,255,255,0.92);
      border-radius: 16px; padding: 24px;
      box-shadow: var(--shadow);
    }
    .chart-card canvas { max-height: 300px; }

    /* ─── Table ─── */
    .table-card {
      background: rgba(255,255,255,0.92);
      border-radius: 16px; padding: 24px;
      box-shadow: var(--shadow); margin-bottom: 28px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th {
      background: var(--primary); color: white;
      padding: 10px 14px; text-align: right; white-space: nowrap;
    }
    th:first-child { border-radius: 0 8px 8px 0; }
    th:last-child  { border-radius: 8px 0 0 8px; }
    td { padding: 10px 14px; border-bottom: 1px solid rgba(0,0,0,0.07); white-space: nowrap; }
    tr:hover td { background: rgba(0,180,216,0.05); }

    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 50px; font-size: 0.78rem; font-weight: 600;
    }
    .badge-green  { background:#d4f7e7; color:#0a6640; }
    .badge-yellow { background:#fff3cd; color:#856404; }
    .badge-orange { background:#ffe0c3; color:#804000; }
    .badge-red    { background:#fde8e8; color:#8b0000; }

    /* ─── Employee Detail ─── */
    #employee-detail {
      background: rgba(255,255,255,0.94);
      border-radius: 16px; padding: 28px;
      box-shadow: var(--shadow); margin-bottom: 28px;
    }
    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .detail-scores {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .detail-score-box {
      background: rgba(0,180,216,0.07);
      border-radius: 12px; padding: 14px; text-align: center;
    }
    .detail-score-box .sc { font-size: 1.7rem; font-weight: 800; color: var(--primary); }
    .detail-score-box .lb { font-size: 0.75rem; color: #666; }
    .cat-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .cat-name { width: 160px; font-size: 0.88rem; color: #444; flex-shrink:0; }
    .cat-bars { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .bar-line { display: flex; align-items: center; gap: 6px; }
    .bar-label { font-size: 0.72rem; width: 36px; color: #888; flex-shrink:0; }
    .bar-bg { flex: 1; height: 10px; background: rgba(0,0,0,0.08); border-radius: 50px; overflow:hidden; }
    .bar-fill { height: 100%; border-radius: 50px; transition: width 0.6s ease; }
    .bar-emp  { background: linear-gradient(90deg,#00b4d8,#0096c7); }
    .bar-mgr  { background: linear-gradient(90deg,#ff8c42,#e05252); }
    .open-answers { margin-top: 20px; }
    .open-q { margin-bottom: 14px; }
    .open-q .q-lbl { font-size: 0.82rem; font-weight: 600; color: var(--primary); margin-bottom: 4px; }
    .open-q .q-ans { font-size: 0.92rem; color: #333; background: rgba(0,0,0,0.04); border-radius:8px; padding: 10px 14px; line-height: 1.5; }

    .filter-row {
      display: flex; gap: 12px; align-items: center; flex-wrap:wrap; margin-bottom: 20px;
    }
    .filter-row select, .filter-row input {
      padding: 9px 14px; border-radius: 8px;
      border: 1.5px solid rgba(26,95,122,0.2);
      font-family: inherit; font-size: 0.9rem;
      background: white; cursor: pointer; direction: rtl;
    }
    .filter-row select:focus, .filter-row input:focus {
      outline: none; border-color: var(--primary-light);
    }
  </style>
</head>
<body>

<!-- ─── Login Overlay ─── -->
<div id="login-overlay">
  <div class="login-box">
    <img src="images/logo.jpg" alt="אוריון מערכות" class="logo"/>
    <p class="tagline" style="margin-bottom:24px;">דשבורד ניהולי – כניסת מנכ"ל</p>
    <input type="password" id="pw-input" placeholder="הכנס סיסמה" class="select-list"
           style="text-align:center; letter-spacing:4px;"
           onkeydown="if(event.key==='Enter') doLogin()"/>
    <p id="pw-error" style="color:#c0392b; font-size:0.9rem; margin:-8px 0 12px; display:none;">סיסמה שגויה</p>
    <button class="btn btn-primary btn-block" onclick="doLogin()">כניסה ←</button>
    <br/>
    <a href="index.html" class="btn btn-secondary btn-block" style="margin-top:8px;">← חזרה לשאלון</a>
  </div>
</div>

<!-- ─── Dashboard ─── -->
<div class="dash-wrap" id="dashboard">

  <div class="dash-header">
    <div style="display:flex;align-items:center;gap:16px;">
      <img src="images/logo.jpg" alt="אוריון מערכות"/>
      <h1>דשבורד ניהולי – שאלוני הערכת עובדים</h1>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="exportExcel()">⬇ ייצוא Excel</button>
      <a href="index.html?from=dashboard" class="btn btn-outline">← לשאלון</a>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row"></div>

  <!-- Charts Row -->
  <div class="grid-2">
    <div class="chart-card">
      <div class="section-title">📊 ציונים כוללים – עובד מול מנהל</div>
      <canvas id="chart-scores"></canvas>
    </div>
    <div class="chart-card">
      <div class="section-title">⚠️ פערים לפי עובד</div>
      <canvas id="chart-gaps"></canvas>
    </div>
  </div>

  <!-- Employee Table -->
  <div class="table-card">
    <div class="section-title">👥 סקירת כל העובדים</div>
    <div class="filter-row">
      <select id="filter-manager" onchange="renderTable()">
        <option value="">כל המנהלים</option>
      </select>
      <select id="filter-status" onchange="renderTable()">
        <option value="">כל הסטטוסים</option>
        <option value="green">סנכרון (פער 0-5)</option>
        <option value="yellow">פער בינוני (6-9)</option>
        <option value="orange">פער משמעותי (10-15)</option>
        <option value="red">פער קריטי (16+)</option>
      </select>
      <input type="text" id="filter-name" placeholder="חיפוש שם..." oninput="renderTable()"/>
    </div>
    <div id="table-wrap"></div>
  </div>

  <!-- Employee Detail -->
  <div id="employee-detail" style="display:none;">
    <div class="detail-header">
      <div>
        <div class="section-title" id="detail-title">פרופיל עובד</div>
        <div id="detail-manager-label" style="font-size:0.85rem; color:#888;"></div>
      </div>
      <button class="btn btn-outline" onclick="closeDetail()">✕ סגור</button>
    </div>
    <div class="detail-scores" id="detail-scores"></div>
    <div id="detail-cats"></div>
    <div class="open-answers" id="detail-open-emp"></div>
    <div class="open-answers" id="detail-open-mgr"></div>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
